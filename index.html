<body>


<div>
    <button id = "toggle grid">Toggle Grid</button> 
    <label>
        Extrusion Height:
        <input type="number" id="extrusion height" value="10">
    </label>
    <button id="extrude">Extrude</button>
    <button id="group">Group</button> 
    <label>
        <input type="checkbox" id="select">Select</input>
    </label>
    <label>
        <input type="color" id="color picker" value="#00ff00">Color</input>
    </label>
</div>

<div>
    <button id="decrease z">Decrease Z</button>
    <button id="increase z">Increase Z</button>
    <button id="decrease y">Decrease Y</button>
    <button id="increase y">Increase Y</button>
    <button id="decrease x">Decrease X</button>
    <button id="increase x">Increase X</button>

</div>
<div>
    <button id="rotate x">Rotate X</button>
    <button id="rotate y">Rotate Y</button>
    <button id="rotate z">Rotate Z</button>
</div>  

<div>
    <button id="scale up object">Scale Object ▲</button>
    <button id="scale down object">Scale Object ▼</button>
    <label>
        <input type="checkbox" id="axis helper">Axis Helper</input>
    </label>
</div>

<div>
    <button id="copy object">Copy Object</button>
    <button id="delete object">Delete Object</button>   
    <button id="save object">Save Object</button>
    <label>
        Load Object:
        <input type="file" id="load object" accept=".gltf,.glb">
    </label>
</div>



    


<div>
    <p> click to add points for extrusion, p for new object. Check select to select objects to transform</p>
    <p> T0 group objects check select and shift click </p>
</div>

<style>
    div{
        
        top: 10px;
        left: 10px;
    }
</style>

<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
  }
}
</script>

<script type="module">

import * as THREE from 'three';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const scene = new THREE.Scene()
scene.background = new THREE.Color(0x000000)

const camera = new THREE.PerspectiveCamera( 45, innerWidth / innerHeight, 1, 1000 );
scene.add( camera );
camera.position.set(100,100,100);
camera.lookAt(0,0,0);


const light = new THREE.DirectionalLight(({color: 0xbfcc10}))
light.position.set(5,5,5)
scene.add(light)

const renderer = new THREE.WebGLRenderer(({antialias:true}))
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);


const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

let grid = null;
let activeObject = null;
let objects = [];
let selectedObjects = [];
let points = []
let markers = [];
let mode = "draw";

function new_object(){
    points = [];
    selectedObjects = [];
    activeObject = null;

    markers.forEach(m => scene.remove(m));
    markers = [];
}   

function createGrid(size, divisions) {
    const gridHelper = new THREE.GridHelper(size, divisions, 0x888888, 0x444444);
    gridHelper.rotation.x = Math.PI / 2; // Rotate to lie on the XY plane
    return gridHelper;
}   

function createExtrusion(height) {
    if (points.length < 2) {
        alert("Please click at least two points to create an extrusion.");
        return;
    }

    const shape = new THREE.Shape(points);
    const extrudeSettings = {
        steps: 1,
        depth: height,
        bevelEnabled: false
    };
    const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
    const material = new THREE.MeshLambertMaterial({ color: 0x00ff00 });
    const mesh = new THREE.Mesh(geometry, material);

    mesh.geometry.computeBoundingSphere();
    mesh.geometry.computeBoundingBox();

    scene.add(mesh);
    objects.push(mesh);


    points.length = 0; // Clear points for next extrusion
    markers.forEach(m => scene.remove(m));
    markers = [];
}   

const toggleGridButton = document.getElementById("toggle grid");
toggleGridButton.addEventListener("click", () => {
    if (grid) {
        scene.remove(grid);
        grid = null;
    } else {
        grid = createGrid(200, 20);
        scene.add(grid);
    }
});     

const extrusionHeightInput = document.getElementById("extrusion height");
extrusionHeightInput.addEventListener("change", () => {
    const height = parseFloat(extrusionHeightInput.value);
    if (isNaN(height) || height <= 0) {
        alert("Please enter a valid positive number for extrusion height.");
        extrusionHeightInput.value = 10; // Reset to default
        return;
    }
}); 
renderer.domElement.addEventListener("pointerdown", (event) => {

    const rect = renderer.domElement.getBoundingClientRect();

    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    // ---------------- SELECT MODE ----------------
    if (mode === "select") {

    const intersects = raycaster.intersectObjects(objects, true);

    if (intersects.length > 0) {

        let clicked = intersects[0].object;

        while (clicked.parent && !objects.includes(clicked)) {
            clicked = clicked.parent;
        }

        if (event.shiftKey) {
            // Add to selection
            if (!selectedObjects.includes(clicked)) {
                selectedObjects.push(clicked);
            }
        } else {
            // Replace selection
            selectedObjects = [clicked];
        }

        activeObject = clicked;

        console.log("Selected objects:", selectedObjects);

    } else {
        selectedObjects = [];
        activeObject = null;
    }

    return;
}



    // ---------------- DRAW MODE ----------------
    if (mode === "draw") {

        const intersection = new THREE.Vector3();
        raycaster.ray.intersectPlane(plane, intersection);

        if (intersection) {

            points.push(new THREE.Vector2(intersection.x, intersection.y));

            const markerGeometry = new THREE.SphereGeometry(0.5, 8, 8);
            const markerMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const marker = new THREE.Mesh(markerGeometry, markerMaterial);

            marker.position.set(intersection.x, intersection.y, 0);
            scene.add(marker);
            markers.push(marker);
        }
    }

});

const loadInput = document.getElementById("load object");
const loader = new GLTFLoader();

loadInput.addEventListener("change", (event) => {

    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {

        const contents = e.target.result;

        loader.parse(contents, '', function (gltf) {

            const model = gltf.scene;

            scene.add(model);
            objects.push(model);

            activeObject = model;
            selectedObjects = [model];

            console.log("Loaded model:", model);

        }, function (error) {
            console.error("Error loading model:", error);
        });

    };

    reader.readAsArrayBuffer(file);

});

const axisHelperCheckbox = document.getElementById("axis helper");
let axisHelper = null;
axisHelperCheckbox.addEventListener("change", () => {
    if (axisHelperCheckbox.checked) {
        axisHelper = new THREE.AxesHelper(20);
        scene.add(axisHelper);
    } else {
        scene.remove(axisHelper);
        axisHelper = null;
    }
}); 

const extrudeButton = document.getElementById("extrude");
extrudeButton.addEventListener("click", () => {
    const height = parseFloat(extrusionHeightInput.value);
    if (isNaN(height) || height <= 0) {
        alert("Please enter a valid positive number for extrusion height.");
        extrusionHeightInput.value = 10; // Reset to default
        return;
    }
    extrudeButton.disabled = true; // Disable button to prevent multiple clicks
    createExtrusion(height);
    extrudeButton.disabled = false; // Re-enable button after extrusion
}); 

const selectCheckbox = document.getElementById("select");
selectCheckbox.addEventListener("change", () => {
    mode = selectCheckbox.checked ? "select" : "draw";
    activeObject = null;
});

const saveObjectButton = document.getElementById("save object");
saveObjectButton.addEventListener("click", () => {
    if (!activeObject) {
        alert("No active object to save. Please select an object first.");
        return;
    }

    const exporter = new GLTFExporter();

    // Clone the object so we can export it standalone without scene interference
    const exportTarget = activeObject.clone();

    exporter.parse(
        exportTarget,
        function (result) {
            let output, blob, filename;

            if (result instanceof ArrayBuffer) {
                // Binary GLB
                blob = new Blob([result], { type: 'application/octet-stream' });
                filename = 'object.glb';
            } else {
                // JSON GLTF
                output = JSON.stringify(result, null, 2);
                blob = new Blob([output], { type: 'application/json' });
                filename = 'object.gltf';
            }

            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        },
        function (error) {
            console.error('GLTFExporter error:', error);
            alert('Failed to export object: ' + error.message);
        },
        { binary: true } // Set to true to export as .glb instead
    );
});

const groupButton = document.getElementById("group");
groupButton.addEventListener("click", () => {

    if (selectedObjects.length === 0) return;

    const group = new THREE.Group();
    scene.add(group);

    // Move selected objects into group
    selectedObjects.forEach(obj => {
        group.add(obj);   // NOT attach
    });

    // Remove individual objects from objects array
    objects = objects.filter(obj => !selectedObjects.includes(obj));

    // Add group as new selectable object
    objects.push(group);

    // Make group the only selected object
    selectedObjects = [group];
    activeObject = group;

});

 
const colorPicker = document.getElementById("color picker");
colorPicker.addEventListener("input", () => {
    const color = new THREE.Color(colorPicker.value);
    selectedObjects.forEach(obj => {
        if (obj.material) {
            obj.material.color.set(color);
        }
    });
});

window.addEventListener('keydown', (event) => {

    if (event.key === 'p') {
        new_object();
    }

});
function transformSelected(callback) {
    selectedObjects.forEach(obj => callback(obj));
}

const zAxisButton = document.getElementById("increase z");
zAxisButton.addEventListener("click", () => {
    transformSelected(obj => obj.position.z += 5);
});


const zAxisDecreaseButton = document.getElementById("decrease z");
zAxisDecreaseButton.addEventListener("click", () => {
    transformSelected(obj => obj.position.z -= 5);
}); 

const yAxisButton = document.getElementById("increase y");
yAxisButton.addEventListener("click", () => {
    transformSelected(obj => obj.position.y += 5);
});

const yAxisDecreaseButton = document.getElementById("decrease y");
yAxisDecreaseButton.addEventListener("click", () => {
    transformSelected(obj => obj.position.y -= 5);
}); 

const xAxisButton = document.getElementById("increase x");
xAxisButton.addEventListener("click", () => {
    transformSelected(obj => obj.position.x += 5);
});
const xAxisDecreaseButton = document.getElementById("decrease x");
xAxisDecreaseButton.addEventListener("click", () => {
    transformSelected(obj => obj.position.x -= 5);
});


const rotateXButton = document.getElementById("rotate x");
rotateXButton.addEventListener("click", () => {
   transformSelected(obj => obj.rotation.x += Math.PI / 16);
    
}); 

const rotateYButton = document.getElementById("rotate y");
rotateYButton.addEventListener("click", () => {
    transformSelected(obj => obj.rotation.y += Math.PI / 16);
    
}); 

const rotateZButton = document.getElementById("rotate z");
rotateZButton.addEventListener("click", () => {
    transformSelected(obj => obj.rotation.z += Math.PI / 16);
    
});

const copyObjectButton = document.getElementById("copy object");
copyObjectButton.addEventListener("click", () => {
    if (activeObject) {
        const clone = activeObject.clone();
        clone.position.x += 10; // Offset the clone to avoid overlap
        scene.add(clone);
        objects.push(clone); // Add the clone to the objects array for selection
    }
});

const deleteObjectButton = document.getElementById("delete object");
deleteObjectButton.addEventListener("click", () => {
    if (activeObject) {
        scene.remove(activeObject);
        objects = objects.filter(obj => obj !== activeObject); // Remove from objects array
        activeObject = null; // Clear active object reference
    }
});

const scaleUpButton = document.getElementById("scale up object");
scaleUpButton.addEventListener("click", () => {
    if (activeObject) {
        activeObject.scale.multiplyScalar(1.25); // Scale up by 25%
    }
});

const scaleDownButton = document.getElementById("scale down object");
scaleDownButton.addEventListener("click", () => {
    if (activeObject) {
        activeObject.scale.multiplyScalar(0.8); // Scale down by 20%
    }
});


function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene, camera);


}   

animate();

</script>

</div>

</body>
