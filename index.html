<div>
    <label>
        <input type="number" id="grid size" value="16" min="0" max="64"> Grid Size
    </label>
    <label>
        <input type="number" id="spacing" value="1" min="0.1" max="5" step="0.1">Spacing
    </label>
    <label>
        <input type="checkbox" id="pixel mode" checked>Pixel Mode
    </label>
    <label>
        <input type="color" id="color picker" value="#00ff00">Color</input>
    </label>
    <button id="export object">Export Object</button>
    <button id="load object">Load Object</button>
    <button id="undo">Undo</button>
    <button id="toggle grid">Toggle Grid</button>
</div>

    <button id="Scale object">Scale Object</button>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
  }
}
</script>
<script type="module">

import * as THREE from 'three';
import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';


const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 7.5);
scene.add(light);

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

let mode = "point";

let points = [];
let indices = [];
let colors = [];
let object = [points, indices, colors];



function createGrid(size) {

    for(let i=0;i<size;i++) {
        for(let j=0;j<size;j++) {
            const pt = new THREE.Vector3((i - size/2) * 0.5, (j - size/2) * 0.5, 0);
            points.push(pt);
        }
    }
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const material = new THREE.PointsMaterial({ color: 0x888888, size: 0.1 });
    let grid = new THREE.Points(geometry, material);
    scene.add(grid);
}

let distances = []
function calc_dist(intersectPoint){
    distances = []
    for(let i=0;i<points.length;i++){
        let dist = Math.sqrt(((points[i].x - intersectPoint.x)**2) + ((points[i].y - intersectPoint.y)**2))
        distances.push(dist)
        //console.log(dist)
    }
}


function least_circle(){

    let lowest = 0 
    for(let i =0;i<distances.length;i++){
        if(distances[i] < distances[lowest]){
            lowest = i
        }
    }
    console.log("lowest index:", lowest)
    let circle_mark = points[lowest]
    indices.push(lowest)

    const material = new THREE.PointsMaterial({ color: 0xff0522, size: 0.1 });
    const geometry = new THREE.CircleGeometry(0.1, 32);
    const circle = new THREE.Mesh(geometry, material);
    
    circle.position.copy(circle_mark);
    scene.add(circle);
    circle.material.color.set(colorPicker.value);

}

function least_pixel(mark){

    let lowest = 0 
    for(let i =0;i<distances.length;i++){
        if(distances[i] < distances[lowest]){
            lowest = i
        }
    }
    console.log("lowest index:", lowest)
    let pixel_mark = points[lowest]
    indices.push(lowest)

    const material = new THREE.PointsMaterial({ color: 0xff0522, size: 0.1 });
    const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.1);
    const square = new THREE.Mesh(geometry, material);
    
    square.position.copy(pixel_mark);
    scene.add(square);
    square.material.color.set(colorPicker.value);

}

const undoButton = document.getElementById("undo");
undoButton.addEventListener("click", () => {
    if (indices.length > 0) {
        indices.pop();
        scene.remove(scene.children[scene.children.length - 1]);
    }
});
const loadButton = document.getElementById("load object");
loadButton.addEventListener("click", () => {
    const loader = new GLTFLoader();
    const reader = new FileReader();
    reader.onload = (event) => {
        const contents = event.target.result;
        loader.parse(contents, '', (gltf) => {
            scene.add(gltf.scene);
        });
    };
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = '.gltf,.glb';
    fileInput.addEventListener('change', (event) => {
        const file = event.target.files[0];
        reader.readAsArrayBuffer(file);
    });
    fileInput.click();
});




const exportButton = document.getElementById("export object");
exportButton.addEventListener("click", () => {
    const exporter = new GLTFExporter();
    const exportScene = new THREE.Scene();

    for (let i = 0; i < scene.children.length; i++) {
        const child = scene.children[i];
        if (child instanceof THREE.Mesh || child instanceof THREE.Points) {
            exportScene.add(child.clone());
        }
    }
    exporter.parse(exportScene, (result) => {
        const output = JSON.stringify(result, null, 2);
        const blob = new Blob([output], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'sketch.gltf';
        link.click();
    }, { binary: false });
});

const toggleGridButton = document.getElementById("toggle grid");
let gridActive = true;
toggleGridButton.addEventListener("click", () => {
    gridActive = !gridActive;
    scene.children.forEach((child) => {
        if (child instanceof THREE.Points && child.geometry instanceof THREE.BufferGeometry) {
            child.visible = gridActive;
        }
    });
});

const colorPicker = document.getElementById("color picker");
colorPicker.addEventListener("input", () => {
    let color = new THREE.Color(colorPicker.value);
    colors.push(color);
});
document.addEventListener('click', (event) => {
    const rect = renderer.domElement.getBoundingClientRect();

    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersectPoint = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, intersectPoint);


    calc_dist(intersectPoint);

    if (mode === "point"){
        least_circle();
    }

    if (mode === "pixel"){
        least_pixel();
    }

});

const keys = {
    w: false,
    a: false,
    s: false,
    d: false
};
document.addEventListener('keydown', (event) => {
    if (event.key in keys) {
        keys[event.key] = true;
    }

    if (event.key === 'w') {
        camera.position.set(camera.position.x, camera.position.y + 0.5, camera.position.z);
    }
    if (event.key === 's') {
        camera.position.set(camera.position.x, camera.position.y - 0.5, camera.position.z);
    }
    if (event.key === 'a') {
        camera.position.set(camera.position.x - 0.5, camera.position.y, camera.position.z);
    }
    if (event.key === 'd') {
        camera.position.set(camera.position.x + 0.5, camera.position.y, camera.position.z);
    }
});

window.addEventListener('wheel', (event) => {
  const zoomSpeed = 0.1;

  if (event.deltaY < 0) {
    camera.position.z -= zoomSpeed;
  } else {
    camera.position.z += zoomSpeed;
  }
});

const scaleButton = document.getElementById("Scale object");
scaleButton.addEventListener("click", () => {
    for (let i = 0; i < scene.children.length; i++) {
        const child = scene.children[i];
        if (child instanceof THREE.Mesh) {
            child.scale.multiplyScalar(0.8);
            child.position.multiplyScalar(0.8);
        }
        else if (child instanceof THREE.Points) {
            child.scale.multiplyScalar(0.8);
            child.position.multiplyScalar(0.8);
        }
    }
});



const selectCheckbox = document.getElementById("pixel mode");
selectCheckbox.addEventListener("change", () => {
    mode = selectCheckbox.checked ? "pixel" : "point";
});

document.getElementById("spacing").addEventListener("change", (event) => {
     let spacing = parseFloat(event.target.value);
});

document.getElementById("grid size").addEventListener("change", (event) => {
    const gridSize = parseInt(event.target.value);
    scene.children.forEach((child) => {
        if (child instanceof THREE.GridHelper) {
            scene.remove(child);
        }
    });
    createGrid(gridSize, spacing);
});

function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

</script>
